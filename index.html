<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Leitura do manifes.json -->
    <link rel="manifest" href="manifest.json">

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ficha Daggerheart · Limiares de Dano</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }
        body {
            background: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ficha-container {
            max-width: 1400px;
            width: 100%;
            background: #f8fafc;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -8px rgba(0,20,30,0.3);
            padding: 1.5rem;
            border: 1px solid #cbd5e1;
        }
        @media (min-width: 768px) {
            .ficha-container {
                padding: 2rem;
            }
        }
        h1 {
            margin: 0 0 0.25rem 0;
            font-weight: 500;
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #0f172a;
            border-bottom: 3px double #94a3b8;
            padding-bottom: 0.5rem;
            text-align: center;
        }
        @media (min-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
            margin-top: -0.2rem;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        /* SEÇÃO LIMIARES - APENAS 3 CAMPOS */
        .secao-limiares {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 48px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.8rem;
        }
        .titulo-limiares {
            text-align: center;
            color: #f1f5f9;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .linha-limiares {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .item-limiar {
            flex: 1;
            min-width: 110px;
            text-align: center;
        }
        .item-limiar .label-dano {
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: block;
        }
        .campo-limiar {
            width: 100%;
        }
        .campo-limiar input {
            width: 100%;
            border: 2px solid #4b5563;
            border-radius: 12px;
            padding: 0.6rem 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            background: #f1f5f9;
            transition: 0.2s;
        }
        .campo-limiar input:focus {
            border-color: #3b82f6;
            outline: none;
            background: white;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }
        @media (max-width: 600px) {
            .linha-limiares {
                flex-direction: column;
                gap: 1rem;
            }
            .item-limiar {
                width: 100%;
            }
        }

        /* GRADE PRINCIPAL - 2 COLUNAS */
        .grid-principal {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 900px) {
            .grid-principal {
                grid-template-columns: 1fr 1.2fr;
            }
        }

        /* COLUNA ESQUERDA */
        .coluna-esquerda {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* CARD BÁSICO */
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1.2rem;
            border: 1px solid #cbd5e1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin: 0 0 1rem 0;
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            border-left: 4px solid #3b82f6;
            padding-left: 0.75rem;
        }

        /* INFORMAÇÕES BÁSICAS */
        .linha-campos {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .campo-basico {
            flex: 1;
            min-width: 100px;
        }
        .campo-basico label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.2rem;
        }
        .campo-basico input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
            background: #f8fafc;
        }
        .campo-basico input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
        }

        /* ATRIBUTOS */
        .atributos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }
        .atributo-item {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 0.4rem;
            text-align: center;
        }
        .atributo-item label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #475569;
            display: block;
            text-transform: uppercase;
        }
        .atributo-item input {
            width: 70%;
            border: none;
            background: white;
            border-radius: 30px;
            padding: 0.3rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 2px;
        }

        /* EXPERIÊNCIAS - TODAS VISÍVEIS EM GRADE */
        .experiencias-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        .exp-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
        }
        .exp-item input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 40px;
        }
        .exp-item input:focus {
            outline: 2px solid #3b82f6;
            background: white;
        }

        /* COLUNA DIREITA */
        .coluna-direita {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* EVASÕES */
        .evasoes-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .evasao-item {
            background: #f1f5f9;
            border-radius: 48px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .evasao-item label {
            font-weight: 600;
            color: #0c4a6e;
            font-size: 0.85rem;
            min-width: 70px;
        }
        .evasao-item label small {
            font-weight: 400;
            font-size: 0.65rem;
        }
        .evasao-item input {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 0.5rem 0.8rem;
            text-align: center;
            font-weight: 500;
            background: white;
            max-width: 100px;
        }

        /* CHECKBOXES RECURSOS */
        .recursos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .recurso-card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 0.6rem;
            text-align: center;
        }
        .recurso-card h4 {
            margin: 0 0 0.5rem 0;
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e293b;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem;
        }
        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.15rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            background: white;
            padding: 0.15rem 0.4rem;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
        }
        .checkbox-group input {
            width: 0.85rem;
            height: 0.85rem;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        /* CONSEQUÊNCIAS */
        .consequencias-area {
            margin-top: 0.5rem;
        }
        .campo-consequencia {
            background: #fef2e8;
            border-radius: 40px;
            margin-bottom: 0.5rem;
        }
        .campo-consequencia input {
            width: 100%;
            border: 1px solid #fed7aa;
            background: white;
            border-radius: 40px;
            padding: 0.6rem 0.8rem;
            font-size: 0.8rem;
        }
        .campo-consequencia input:focus {
            outline: none;
            border-color: #f97316;
        }
        .campo-consequencia input::placeholder {
            color: #9ca3af;
            font-size: 0.7rem;
        }

        /* ANOTAÇÕES */
        .anotacoes-area {
            margin-top: 1rem;
        }
        .anotacoes-card {
            background: #fef9e3;
            border-radius: 28px;
            padding: 1rem;
            border: 1px solid #fde047;
        }
        .anotacoes-card label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #854d0e;
            display: block;
            margin-bottom: 0.6rem;
        }
        .anotacoes-card textarea {
            width: 100%;
            border: 1px solid #facc15;
            border-radius: 24px;
            padding: 0.8rem;
            font-size: 0.85rem;
            line-height: 1.4;
            background: white;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .save-toast {
            text-align: right;
            font-size: 0.7rem;
            color: #15803d;
            margin-top: 1rem;
            font-weight: 500;
        }
    </style>
</head>
    
<!-- Leitura do ServicdWorker -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    
<body>
<div class="ficha-container">
    <h1>⚔️ DAGGERHEART · LIMIARES EXPANDIDOS</h1>
    <div class="sub">Maior | Grave | Extremo + Consequência</div>

    <!-- SEÇÃO LIMIARES - APENAS 3 CAMPOS -->
    <div class="secao-limiares">
        <div class="titulo-limiares">🛡️ LIMIARES DE DANO</div>
        <div class="linha-limiares">
            <div class="item-limiar">
                <span class="label-dano">DANO MAIOR</span>
                <div class="campo-limiar"><input type="text" id="limiar_maior" placeholder=""></div>
            </div>
            <div class="item-limiar">
                <span class="label-dano">DANO GRAVE</span>
                <div class="campo-limiar"><input type="text" id="limiar_grave" placeholder=""></div>
            </div>
            <div class="item-limiar">
                <span class="label-dano">DANO EXTREMO</span>
                <div class="campo-limiar"><input type="text" id="limiar_extremo" placeholder=""></div>
            </div>
        </div>
    </div>

    <!-- GRADE PRINCIPAL: 2 COLUNAS -->
    <div class="grid-principal">
        <!-- COLUNA ESQUERDA: IDENTIDADE + ATRIBUTOS + EXPERIÊNCIAS -->
        <div class="coluna-esquerda">
            <div class="card">
                <h3>📖 IDENTIDADE</h3>
                <div class="linha-campos">
                    <div class="campo-basico">
                        <label>NOME</label>
                        <input type="text" id="nome" placeholder="Nome">
                    </div>
                    <div class="campo-basico">
                        <label>ANCESTRALIDADE</label>
                        <input type="text" id="ancestralidade" placeholder="Ex: Elfo">
                    </div>
                    <div class="campo-basico">
                        <label>COMUNIDADE</label>
                        <input type="text" id="comunidade" placeholder="Clã">
                    </div>
                </div>
                <h3>⚙️ ATRIBUTOS</h3>
                <div class="atributos-grid">
                    <div class="atributo-item"><label>AGI</label><input type="text" id="agi" placeholder="0"></div>
                    <div class="atributo-item"><label>FOR</label><input type="text" id="forca" placeholder="0"></div>
                    <div class="atributo-item"><label>ACU</label><input type="text" id="acu" placeholder="0"></div>
                    <div class="atributo-item"><label>INS</label><input type="text" id="inst" placeholder="0"></div>
                    <div class="atributo-item"><label>PRE</label><input type="text" id="pres" placeholder="0"></div>
                    <div class="atributo-item"><label>CON</label><input type="text" id="conh" placeholder="0"></div>
                </div>
            </div>

            <!-- EXPERIÊNCIAS - GRADE 2x5, TODAS VISÍVEIS -->
            <div class="card">
                <h3>✨ EXPERIÊNCIAS</h3>
                <div class="experiencias-grid">
                    <div class="exp-item"><input type="text" id="exp1" placeholder="Experiência 1"></div>
                    <div class="exp-item"><input type="text" id="exp2" placeholder="Experiência 2"></div>
                    <div class="exp-item"><input type="text" id="exp3" placeholder="Experiência 3"></div>
                    <div class="exp-item"><input type="text" id="exp4" placeholder="Experiência 4"></div>
                    <div class="exp-item"><input type="text" id="exp5" placeholder="Experiência 5"></div>
                    <div class="exp-item"><input type="text" id="exp6" placeholder="Experiência 6"></div>
                    <div class="exp-item"><input type="text" id="exp7" placeholder="Experiência 7"></div>
                    <div class="exp-item"><input type="text" id="exp8" placeholder="Experiência 8"></div>
                    <div class="exp-item"><input type="text" id="exp9" placeholder="Experiência 9"></div>
                    <div class="exp-item"><input type="text" id="exp10" placeholder="Experiência 10"></div>
                </div>
            </div>
        </div>

        <!-- COLUNA DIREITA: EVASÕES + RECURSOS + CONSEQUÊNCIAS -->
        <div class="coluna-direita">
            <div class="card">
                <h3>🛡️ EVASÕES</h3>
                <div class="evasoes-grid">
                    <div class="evasao-item">
                        <label>EVASÃO <small>física</small></label>
                        <input type="text" id="evasao_fis" placeholder="Valor">
                    </div>
                    <div class="evasao-item">
                        <label>EVASÃO <small>social</small></label>
                        <input type="text" id="evasao_soc" placeholder="Valor">
                    </div>
                    <div class="evasao-item">
                        <label>EVASÃO <small>mental</small></label>
                        <input type="text" id="evasao_men" placeholder="Valor">
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>💪 RECURSOS</h3>
                <div class="recursos-grid">
                    <div class="recurso-card"><h4>🩸 PV</h4><div class="checkbox-group" id="pv-checkboxes"></div></div>
                    <div class="recurso-card"><h4>⚡ PF</h4><div class="checkbox-group" id="pf-checkboxes"></div></div>
                    <div class="recurso-card"><h4>🔮 Esp</h4><div class="checkbox-group" id="esp-checkboxes"></div></div>
                    <div class="recurso-card"><h4>😨 Medo</h4><div class="checkbox-group" id="medo-checkboxes"></div></div>
                </div>
            </div>

            <div class="card">
                <h3>⚠️ CONSEQUÊNCIAS (Extremo)</h3>
                <div class="consequencias-area">
                    <div class="campo-consequencia"><input type="text" id="consequencia_leve" placeholder="Consequência leve (1º extremo)"></div>
                    <div class="campo-consequencia"><input type="text" id="consequencia_media" placeholder="Consequência média (2º extremo)"></div>
                    <div class="campo-consequencia"><input type="text" id="consequencia_grave" placeholder="Consequência grave (3º+ extremo)"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ANOTAÇÕES GERAIS -->
    <div class="anotacoes-area">
        <div class="anotacoes-card">
            <label>📜 ANOTAÇÕES · ITENS · HISTÓRIA</label>
            <textarea id="anotacoes" placeholder="Registre itens, aliados, missões, cicatrizes e segredos..."></textarea>
        </div>
    </div>

    <div class="save-toast" id="saveToast">💾 salvamento automático</div>
</div>

<script>
    (function() {
        const camposTextoIds = [
            'nome', 'ancestralidade', 'comunidade',
            'agi', 'forca', 'acu', 'inst', 'pres', 'conh',
            'evasao_fis', 'evasao_soc', 'evasao_men',
            'exp1', 'exp2', 'exp3', 'exp4', 'exp5', 'exp6', 'exp7', 'exp8', 'exp9', 'exp10',
            'anotacoes',
            'limiar_maior', 'limiar_grave', 'limiar_extremo',
            'consequencia_leve', 'consequencia_media', 'consequencia_grave'
        ];

        function carregarTextos() {
            camposTextoIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const saved = localStorage.getItem(`ficha_dh_${id}`);
                    if (saved !== null) el.value = saved;
                }
            });
        }

        function salvarTexto(id) {
            const el = document.getElementById(id);
            if (el) localStorage.setItem(`ficha_dh_${id}`, el.value);
        }

        const contadores = ['pv', 'pf', 'esp', 'medo'];

        function criarCheckboxes() {
            contadores.forEach(cat => {
                const container = document.getElementById(`${cat}-checkboxes`);
                if (!container) return;
                container.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const chkId = `chk_${cat}_${i}`;
                    const label = document.createElement('label');
                    label.htmlFor = chkId;
                    label.textContent = i;

                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.id = chkId;

                    label.prepend(chk);
                    container.appendChild(label);
                }
            });
        }

        function carregarCheckboxes() {
            for (let cat of contadores) {
                for (let i = 1; i <= 10; i++) {
                    const chk = document.getElementById(`chk_${cat}_${i}`);
                    if (chk) {
                        const val = localStorage.getItem(`chk_${cat}_${i}`);
                        chk.checked = (val === 'true');
                    }
                }
            }
        }

        function salvarCheckbox(id) {
            const chk = document.getElementById(id);
            if (chk) localStorage.setItem(id, chk.checked);
        }

        function atualizarToast() {
            const toast = document.getElementById('saveToast');
            toast.innerText = '💾 salvo • ' + new Date().toLocaleTimeString();
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => {
                toast.innerText = '💾 salvamento automático';
            }, 1800);
        }

        window.addEventListener('DOMContentLoaded', () => {
            criarCheckboxes();
            carregarTextos();
            carregarCheckboxes();

            camposTextoIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', () => {
                        salvarTexto(id);
                        atualizarToast();
                    });
                }
            });

            contadores.forEach(cat => {
                for (let i = 1; i <= 10; i++) {
                    const chk = document.getElementById(`chk_${cat}_${i}`);
                    if (chk) {
                        chk.addEventListener('change', (e) => {
                            salvarCheckbox(e.target.id);
                            atualizarToast();
                        });
                    }
                }
            });

            window.addEventListener('beforeunload', () => {
                camposTextoIds.forEach(id => salvarTexto(id));
                for (let cat of contadores) {
                    for (let i = 1; i <= 10; i++) {
                        const chk = document.getElementById(`chk_${cat}_${i}`);
                        if (chk) localStorage.setItem(`chk_${cat}_${i}`, chk.checked);
                    }
                }
            });
        });
    })();
</script>
</body>
</html>
